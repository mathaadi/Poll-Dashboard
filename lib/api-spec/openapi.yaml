openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Poll Analytics Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: upload
    description: CSV upload operations
  - name: dashboard
    description: Dashboard analytics operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /summary:
    get:
      operationId: getSummary
      tags: [dashboard]
      summary: Get overall summary stats
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Summary"

  /subjects:
    get:
      operationId: getSubjects
      tags: [dashboard]
      summary: Get per-subject analytics
      responses:
        "200":
          description: Subject analytics list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubjectAnalytics"

  /subject-sessions:
    get:
      operationId: getSubjectSessions
      tags: [dashboard]
      summary: Get sessions list for a subject
      parameters:
        - name: subject
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session list for subject
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubjectSession"

  /cohorts:
    get:
      operationId: getCohorts
      tags: [dashboard]
      summary: Get cohort breakdown
      responses:
        "200":
          description: Cohort breakdown list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CohortAnalytics"

  /trends:
    get:
      operationId: getTrends
      tags: [dashboard]
      summary: Get weekly trends
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Weekly trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

  /distribution:
    get:
      operationId: getDistribution
      tags: [dashboard]
      summary: Get rating distribution
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [delivery, content]
        - name: upload_id
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Rating distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Distribution"

  /distribution/overall:
    get:
      operationId: getDistributionOverall
      tags: [dashboard]
      summary: Get overall distribution across all sessions
      responses:
        "200":
          description: Overall distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverallDistribution"

  /feedback:
    get:
      operationId: getFeedback
      tags: [dashboard]
      summary: Get NLP feedback analysis
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
        - name: upload_id
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Feedback NLP analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackAnalysis"

  /feedback/overview:
    get:
      operationId: getFeedbackOverview
      tags: [dashboard]
      summary: Get overall feedback sentiment overview
      responses:
        "200":
          description: Overall feedback overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackOverview"

  /history:
    get:
      operationId: getHistory
      tags: [dashboard]
      summary: Get upload history
      responses:
        "200":
          description: Upload history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadHistory"

  /upload:
    post:
      operationId: uploadCsv
      tags: [upload]
      summary: Upload a Zoom poll CSV
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                program_name:
                  type: string
                session_type:
                  type: string
                cohort:
                  type: string
                semester:
                  type: string
                week_number:
                  type: string
                instructor:
                  type: string
                topic:
                  type: string
              required:
                - file
                - program_name
                - semester
                - week_number
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "400":
          description: Upload error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadError"

  /upload/{id}:
    patch:
      operationId: patchUpload
      tags: [upload]
      summary: Update instructor and topic for an upload
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                instructor:
                  type: string
                  nullable: true
                topic:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Update result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /instructors:
    get:
      operationId: getInstructors
      tags: [dashboard]
      summary: Get all instructors with analytics
      responses:
        "200":
          description: Instructor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstructorSummary"

  /instructor/{name}:
    get:
      operationId: getInstructor
      tags: [dashboard]
      summary: Get per-instructor drill-down
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Instructor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstructorDetail"

  /topics:
    get:
      operationId: getTopics
      tags: [dashboard]
      summary: Get all topics with analytics
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
        - name: instructor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Topic list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopicSummary"

  /topic/{topicName}:
    get:
      operationId: getTopic
      tags: [dashboard]
      summary: Get per-topic drill-down
      parameters:
        - name: topicName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Topic detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicDetail"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Summary:
      type: object
      properties:
        total_sessions:
          type: integer
        total_responses:
          type: integer
        avg_delivery:
          type: number
        avg_content:
          type: number
        avg_combined:
          type: number
        subjects:
          type: array
          items:
            type: string
        programs:
          type: array
          items:
            type: string
        date_range:
          type: object
          properties:
            from:
              type: string
            to:
              type: string
          required:
            - from
            - to
        total_instructors:
          type: integer
        total_topics:
          type: integer
      required:
        - total_sessions
        - total_responses
        - avg_delivery
        - avg_content
        - avg_combined
        - subjects
        - programs
        - date_range
        - total_instructors
        - total_topics

    SubjectSession:
      type: object
      properties:
        upload_id:
          type: integer
        session_date:
          type: string
        week_number:
          type: string
        total_responses:
          type: integer
        avg_delivery:
          type: number
        avg_content:
          type: number
        instructor:
          type: string
          nullable: true
        topic:
          type: string
          nullable: true
      required:
        - upload_id
        - session_date
        - week_number
        - total_responses
        - avg_delivery
        - avg_content

    TrendPoint:
      type: object
      properties:
        session_date:
          type: string
        week:
          type: string
        avg_delivery:
          type: number
        avg_content:
          type: number
        responses:
          type: integer
        subject:
          type: string
      required:
        - session_date
        - week
        - avg_delivery
        - avg_content
        - responses

    SubjectTrendPoint:
      type: object
      properties:
        week:
          type: string
        delivery:
          type: number
        content:
          type: number
      required:
        - week
        - delivery
        - content

    SubjectAnalytics:
      type: object
      properties:
        subject:
          type: string
        total_sessions:
          type: integer
        total_responses:
          type: integer
        avg_delivery:
          type: number
        avg_content:
          type: number
        nps:
          type: number
        trend:
          type: array
          items:
            $ref: "#/components/schemas/SubjectTrendPoint"
        instructors:
          type: array
          items:
            type: string
      required:
        - subject
        - total_sessions
        - total_responses
        - avg_delivery
        - avg_content
        - nps
        - trend

    CohortSubjectRating:
      type: object
      additionalProperties:
        type: object
        properties:
          avg_delivery:
            type: number
          avg_content:
            type: number
        required:
          - avg_delivery
          - avg_content

    CohortAnalytics:
      type: object
      properties:
        cohort:
          type: string
        total_responses:
          type: integer
        avg_delivery:
          type: number
        avg_content:
          type: number
        by_subject:
          $ref: "#/components/schemas/CohortSubjectRating"
      required:
        - cohort
        - total_responses
        - avg_delivery
        - avg_content
        - by_subject

    Distribution:
      type: object
      properties:
        "1":
          type: integer
        "2":
          type: integer
        "3":
          type: integer
        "4":
          type: integer
        "5":
          type: integer
        total:
          type: integer
        nps:
          type: number
      required:
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - total
        - nps

    DistributionBucket:
      type: object
      properties:
        "1":
          type: integer
        "2":
          type: integer
        "3":
          type: integer
        "4":
          type: integer
        "5":
          type: integer
      required:
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"

    OverallDistribution:
      type: object
      properties:
        delivery:
          $ref: "#/components/schemas/DistributionBucket"
        content:
          $ref: "#/components/schemas/DistributionBucket"
        total_responses:
          type: integer
        nps_delivery:
          type: number
        nps_content:
          type: number
      required:
        - delivery
        - content
        - total_responses
        - nps_delivery
        - nps_content

    ThemeCount:
      type: object
      properties:
        theme:
          type: string
        count:
          type: integer
      required:
        - theme
        - count

    SentimentBreakdown:
      type: object
      properties:
        positive:
          type: integer
        negative:
          type: integer
        suggestion:
          type: integer
        neutral:
          type: integer
      required:
        - positive
        - negative
        - suggestion
        - neutral

    SentimentPercent:
      type: object
      properties:
        positive:
          type: number
        negative:
          type: number
        suggestion:
          type: number
        neutral:
          type: number
      required:
        - positive
        - negative
        - suggestion
        - neutral

    FeedbackAnalysis:
      type: object
      properties:
        total_feedback:
          type: integer
        useful_feedback:
          type: integer
        sentiment:
          $ref: "#/components/schemas/SentimentBreakdown"
        themes:
          type: array
          items:
            $ref: "#/components/schemas/ThemeCount"
        top_negative:
          type: array
          items:
            type: string
        top_suggestions:
          type: array
          items:
            type: string
        top_positive:
          type: array
          items:
            type: string
      required:
        - total_feedback
        - useful_feedback
        - sentiment
        - themes
        - top_negative
        - top_suggestions
        - top_positive

    FeedbackOverview:
      type: object
      properties:
        total_useful:
          type: integer
        sentiment_counts:
          $ref: "#/components/schemas/SentimentBreakdown"
        sentiment_percent:
          $ref: "#/components/schemas/SentimentPercent"
        top_themes:
          type: array
          items:
            $ref: "#/components/schemas/ThemeCount"
      required:
        - total_useful
        - sentiment_counts
        - sentiment_percent
        - top_themes

    UploadHistory:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        session_date:
          type: string
        program_name:
          type: string
        week_number:
          type: string
        total_responses:
          type: integer
        avg_combined_rating:
          type: number
        upload_timestamp:
          type: string
        session_type:
          type: string
        meeting_topic:
          type: string
        format_version:
          type: string
        instructor:
          type: string
          nullable: true
        topic:
          type: string
          nullable: true
      required:
        - id
        - subject
        - session_date
        - program_name
        - week_number
        - total_responses
        - avg_combined_rating
        - upload_timestamp
        - session_type
        - meeting_topic

    UploadResult:
      type: object
      properties:
        success:
          type: boolean
        upload_id:
          type: integer
        subject:
          type: string
        total_responses:
          type: integer
        avg_delivery_rating:
          type: number
          nullable: true
        avg_content_rating:
          type: number
          nullable: true
        message:
          type: string
        format:
          type: string
        instructor:
          type: string
          nullable: true
        topic:
          type: string
          nullable: true
      required:
        - success
        - upload_id
        - subject
        - total_responses
        - avg_delivery_rating
        - avg_content_rating

    UploadError:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
        message:
          type: string
        original_upload_date:
          type: string
      required:
        - success
        - error
        - message

    InstructorSummary:
      type: object
      properties:
        instructor:
          type: string
        total_sessions:
          type: integer
        subjects:
          type: array
          items:
            type: string
        total_responses:
          type: integer
        avg_rating:
          type: number
        avg_delivery:
          type: number
        avg_content:
          type: number
      required:
        - instructor
        - total_sessions
        - subjects
        - total_responses
        - avg_rating
        - avg_delivery
        - avg_content

    InstructorByWeek:
      type: object
      properties:
        session_date:
          type: string
        subject:
          type: string
        avg_rating:
          type: number
        responses:
          type: integer
      required:
        - session_date
        - subject
        - avg_rating
        - responses

    InstructorDetail:
      type: object
      properties:
        instructor:
          type: string
        total_sessions:
          type: integer
        total_responses:
          type: integer
        avg_rating:
          type: number
        avg_delivery:
          type: number
        avg_content:
          type: number
        by_subject:
          type: object
          additionalProperties:
            type: object
            properties:
              avg:
                type: number
              sessions:
                type: integer
        by_week:
          type: array
          items:
            $ref: "#/components/schemas/InstructorByWeek"
        feedback_summary:
          type: object
          properties:
            positive:
              type: integer
            negative:
              type: integer
            suggestion:
              type: integer
            top_themes:
              type: array
              items:
                type: string
      required:
        - instructor
        - total_sessions
        - total_responses
        - avg_rating
        - by_subject
        - by_week
        - feedback_summary

    TopicSummary:
      type: object
      properties:
        topic:
          type: string
        subject:
          type: string
        instructor:
          type: string
          nullable: true
        sessions:
          type: integer
        total_responses:
          type: integer
        avg_rating:
          type: number
        feedback_count:
          type: integer
      required:
        - topic
        - subject
        - sessions
        - total_responses
        - avg_rating
        - feedback_count

    TopicDetail:
      type: object
      properties:
        topic:
          type: string
        subject:
          type: string
        instructor:
          type: string
          nullable: true
        session_date:
          type: string
        total_responses:
          type: integer
        avg_delivery:
          type: number
        avg_content:
          type: number
        distribution:
          type: object
          additionalProperties:
            type: integer
        nps:
          type: number
        feedback:
          type: object
          properties:
            useful:
              type: integer
            sentiment:
              $ref: "#/components/schemas/SentimentBreakdown"
            top_issues:
              type: array
              items:
                type: string
            suggestions:
              type: array
              items:
                type: string
      required:
        - topic
        - subject
        - session_date
        - total_responses
        - avg_delivery
        - avg_content
        - distribution
        - nps
        - feedback
